<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>AirWise AI — Delhi Air Quality Companion</title>
    <meta name="description" content="AI-powered public health companion for making healthier outdoor decisions in Delhi using live air quality, weather and routing data." />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the
      // wrong colour scheme. Mirrors ThemeContext's resolution logic.
      (function () {
        try {
          var stored = localStorage.getItem("airwise-theme");
          var light =
            stored === "light" ||
            (!stored && window.matchMedia("(prefers-color-scheme: light)").matches);
          var root = document.documentElement;
          root.classList.toggle("light", light);
          root.classList.toggle("dark", !light);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
